workflows:
  android-release:
    name: Lifestones Android Release
    max_build_duration: 60
    environment:
      flutter: 3.41.4
      java: 17
    scripts:
      - name: Regenerate Android project
        script: |
          mkdir -p /tmp/backup/lib
          cp pubspec.yaml /tmp/backup/
          cp -r lib/. /tmp/backup/lib/
          cp android/app/google-services.json /tmp/backup/ 2>/dev/null || true
          cp ci/build.gradle.kts /tmp/backup/
          rm -rf android ios linux macos web windows
          flutter create --project-name lifestones --org com.example.lifestones .
          cp /tmp/backup/pubspec.yaml .
          cp -r /tmp/backup/lib/. lib/
          cp /tmp/backup/google-services.json android/app/ 2>/dev/null || true
          cp /tmp/backup/build.gradle.kts android/app/build.gradle.kts

      - name: Fix settings.gradle.kts
        script: |
          python3 << 'PYEOF'
          with open('android/settings.gradle.kts', 'r') as f:
              content = f.read()
          if 'com.google.gms.google-services' not in content:
              content = content.replace(
                  'plugins {',
                  'plugins {\n    id("com.google.gms.google-services") version "4.4.0" apply false',
                  1
              )
          with open('android/settings.gradle.kts', 'w') as f:
              f.write(content)
          PYEOF

      - name: Fix gradle.properties
        script: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Fix AndroidManifest
        script: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Lifestones</string>
          </resources>
          XMLEOF
          cat > android/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <application
                  android:label="@string/app_name"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  tools:replace="android:label">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          XMLEOF

      - name: Install dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release --android-skip-build-dependency-validation

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
