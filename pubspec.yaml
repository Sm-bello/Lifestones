name: lifestones
description: Lifestones Church Discipleship App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.0.3
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  firebase_messaging: ^15.1.3
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  flutter_local_notifications: ^17.2.3
  google_sign_in: 6.2.1
  image_picker: ^1.1.2
  just_audio: ^0.9.40
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
