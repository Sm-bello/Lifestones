name: lifestones
description: Lifestones Church Discipleship App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  jitsi_meet_flutter_sdk: ^11.6.0
  connectivity_plus: ^7.0.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  google_sign_in: ^6.2.1
  timezone: ^0.9.4
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  cloud_firestore: ^5.6.12
  image_picker: ^1.2.1
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
