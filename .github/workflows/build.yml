name: Build Lifestones APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Bump compileSdk to 36
        run: sed -i 's/compileSdk = [0-9]*/compileSdk = 36/' android/app/build.gradle.kts

      - name: Increase Gradle memory
        run: echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> android/gradle.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lifestones-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
