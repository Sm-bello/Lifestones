name: Build Lifestones APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools and fix aapt2
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-36"
          AAPT2=$(find $ANDROID_SDK_ROOT -name "aapt2" -type f | head -1)
          echo "Found aapt2 at: $AAPT2"
          sudo ln -sf $AAPT2 /usr/bin/aapt2
          aapt2 version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Fix compileSdk and memory
        run: |
          sed -i 's/compileSdk = [0-9]*/compileSdk = 36/' android/app/build.gradle.kts
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> android/gradle.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lifestones-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
